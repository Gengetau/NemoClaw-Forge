<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moonlight Ledger - 月光账本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0b10;
            color: #e2e8f0;
        }
        .lunar-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .moon-glow {
            box-shadow: 0 0 20px rgba(147, 197, 253, 0.2);
        }
        input, select {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-md mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-blue-300">月光账本</h1>
                <p class="text-xs text-slate-500">Moonlight Ledger v0.1</p>
            </div>
            <div class="text-right">
                <span class="text-xs block text-slate-400">本月总计</span>
                <span class="text-xl font-semibold text-blue-200">¥ {{ summary.total.toLocaleString() }}</span>
            </div>
        </header>

        <!-- Add Expense Form -->
        <div class="lunar-glass rounded-2xl p-6 mb-8 moon-glow">
            <h2 class="text-sm font-semibold mb-4 text-slate-300 uppercase tracking-wider">记录新脉冲</h2>
            <div class="space-y-4">
                <input v-model="form.item" type="text" placeholder="消费项 (例: 买菜)" class="w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition">
                <div class="flex gap-2">
                    <input v-model.number="form.amount" type="number" placeholder="金额" class="w-2/3 p-3 rounded-xl focus:outline-none">
                    <select v-model="form.category" class="w-1/3 p-3 rounded-xl focus:outline-none">
                        <option value="General">日常</option>
                        <option value="Food">餐饮</option>
                        <option value="Tech">赛博</option>
                        <option value="Life">生活</option>
                    </select>
                </div>
                <button @click="addExpense" :disabled="loading" class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-semibold p-3 rounded-xl transition shadow-lg shadow-blue-900/20">
                    {{ loading ? '同步中...' : '镌刻入库' }}
                </button>
            </div>
        </div>

        <!-- History -->
        <div>
            <h2 class="text-sm font-semibold mb-4 text-slate-400 uppercase tracking-wider px-2">历史记忆</h2>
            <div class="space-y-3">
                <div v-for="ex in expenses" :key="e.id" class="lunar-glass rounded-xl p-4 flex justify-between items-center animate-fade-in">
                    <div>
                        <div class="font-medium">{{ ex.item }}</div>
                        <div class="text-xs text-slate-500">{{ formatDate(ex.timestamp) }} · {{ ex.category }}</div>
                    </div>
                    <div class="text-blue-200 font-semibold">- ¥{{ ex.amount }}</div>
                </div>
                <div v-if="expenses.length === 0" class="text-center text-slate-600 py-8 italic">
                    暂无记忆存留...
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const expenses = ref([]);
                const summary = ref({ total: 0 });
                const loading = ref(false);
                const form = ref({ item: '', amount: null, category: 'General' });

                const fetchAll = async () => {
                    const [exResp, sumResp] = await Promise.all([
                        fetch('/expenses'),
                        fetch('/summary')
                    ]);
                    expenses.value = await exResp.json();
                    summary.value = await sumResp.json();
                };

                const addExpense = async () => {
                    if (!form.value.item || !form.value.amount) return;
                    loading.value = true;
                    try {
                        await fetch('/expenses', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(form.value)
                        });
                        form.value = { item: '', amount: null, category: 'General' };
                        await fetchAll();
                    } finally {
                        loading.value = false;
                    }
                };

                const formatDate = (isoStr) => {
                    const d = new Date(isoStr);
                    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
                };

                onMounted(fetchAll);

                return { expenses, summary, form, loading, addExpense, formatDate };
            }
        }).mount('#app');
    </script>
</body>
</html>
